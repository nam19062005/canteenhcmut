<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Quản Lý</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-gray-800">Bảng Điều Khiển (Manager Dashboard)</h1>

        <div class="bg-white p-6 rounded-lg shadow-md">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 pb-2 border-b">
                <h2 class="text-xl font-bold text-gray-800">Thống kê Doanh thu (Đơn hoàn thành)</h2>
                <select id="time-filter" class="border border-gray-300 p-2 rounded-lg font-medium text-blue-700 bg-blue-50 focus:outline-none" onchange="loadStats()">
                    <option value="today">Hôm nay</option>
                    <option value="month">Tháng này</option>
                    <option value="all" selected>Tất cả thời gian</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-blue-50 p-4 rounded border border-blue-200">
                    <p class="text-gray-500">Tổng doanh thu</p>
                    <p id="stat-revenue" class="text-2xl font-bold text-blue-700">0 đ</p>
                </div>
                <div class="bg-green-50 p-4 rounded border border-green-200">
                    <p class="text-gray-500">Tổng số đơn hàng</p>
                    <p id="stat-orders" class="text-2xl font-bold text-green-700">0</p>
                </div>
            </div>
            <div class="w-full max-w-2xl mx-auto"><canvas id="revenueChart"></canvas></div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
            <h2 class="text-xl font-bold mb-4 text-green-700">Thêm Món Mới</h2>
            <form id="add-food-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên món</label>
                    <input type="text" id="new-name" class="w-full border border-gray-300 p-2 rounded focus:border-green-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giá bán (VNĐ)</label>
                    <input type="number" id="new-price" class="w-full border border-gray-300 p-2 rounded focus:border-green-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Số lượng tồn kho</label>
                    <input type="number" id="new-qty" class="w-full border border-gray-300 p-2 rounded focus:border-green-500" value="0" min="0" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Thuộc Căn tin</label>
                    <select id="new-canteen" class="w-full border border-gray-300 p-2 rounded" required></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Danh mục món</label>
                    <select id="new-category" class="w-full border border-gray-300 p-2 rounded" required></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Link Ảnh minh họa (URL)</label>
                    <input type="url" id="new-image-url" class="w-full border border-gray-300 p-2 rounded focus:border-green-500" placeholder="https://...">
                </div>
                <div class="md:col-span-3 flex justify-end">
                    <button type="submit" class="bg-green-600 text-white font-bold py-2 px-6 rounded hover:bg-green-700 transition">
                        + Xác nhận Thêm
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4">Quản lý Kho hàng hiện tại</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-200 text-gray-700">
                            <th class="p-3 border-b">ID</th>
                            <th class="p-3 border-b">Tên món</th>
                            <th class="p-3 border-b">Căn tin</th>
                            <th class="p-3 border-b text-center">Số lượng tồn</th>
                            <th class="p-3 border-b">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table"></tbody>
                </table>
            </div>
        </div>

        <div id="editModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex justify-center items-center z-50">
            <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-lg">
                <h2 class="text-2xl font-bold mb-4 text-blue-700 border-b pb-2">Chỉnh sửa Món Ăn</h2>
                <form id="edit-food-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="hidden" id="edit-id">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-1">Tên món</label>
                        <input type="text" id="edit-name" class="w-full border p-2 rounded focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Giá bán (VNĐ)</label>
                        <input type="number" id="edit-price" class="w-full border p-2 rounded focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Số lượng tồn</label>
                        <input type="number" id="edit-qty" class="w-full border p-2 rounded focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Căn tin</label>
                        <select id="edit-canteen" class="w-full border p-2 rounded" required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Danh mục</label>
                        <select id="edit-category" class="w-full border p-2 rounded" required></select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-1">Link Ảnh</label>
                        <input type="url" id="edit-image-url" class="w-full border p-2 rounded focus:border-blue-500">
                    </div>
                    <div class="md:col-span-2 flex justify-end space-x-3 mt-4 pt-4 border-t">
                        <button type="button" onclick="closeEditModal()" class="bg-gray-400 text-white px-4 py-2 rounded font-bold hover:bg-gray-500 transition">Hủy</button>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 transition">Lưu Thay Đổi</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>
        let allFoods = []; 
        let revenueChart = null; // Biến lưu trữ biểu đồ để reset khi đổi bộ lọc

        // --- HÀM THỐNG KÊ (Đã tích hợp bộ lọc) ---
        async function loadStats() {
            const filterType = document.getElementById('time-filter').value;
            const res = await fetch(`/api/admin/stats?filter=${filterType}`);
            const data = await res.json();
            
            document.getElementById('stat-revenue').innerText = data.revenue.toLocaleString() + ' đ';
            document.getElementById('stat-orders').innerText = data.orders;
            
            let labelText = 'Tất cả thời gian';
            if (filterType === 'today') labelText = 'Hôm nay';
            if (filterType === 'month') labelText = 'Tháng này';

            // Xóa biểu đồ cũ (nếu có) trước khi vẽ cái mới
            if (revenueChart) {
                revenueChart.destroy();
            }

            const ctx = document.getElementById('revenueChart').getContext('2d');
            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [labelText],
                    datasets: [{ 
                        label: 'Doanh thu (VNĐ)', 
                        data: [data.revenue], 
                        backgroundColor: 'rgba(59, 130, 246, 0.6)', 
                        borderColor: 'rgba(37, 99, 235, 1)', 
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: { 
                    scales: { y: { beginAtZero: true } },
                    animation: { duration: 500 }
                }
            });
        }

        // --- HÀM TẢI KHO HÀNG ---
        async function loadInventory() {
            const res = await fetch('/api/admin/inventory');
            allFoods = await res.json(); 
            
            document.getElementById('inventory-table').innerHTML = allFoods.map(f => `
                <tr class="hover:bg-gray-50 transition border-b">
                    <td class="p-3 text-gray-500">#${f.id}</td>
                    <td class="p-3 font-semibold text-blue-700">${f.name}</td>
                    <td class="p-3">${f.canteen}</td>
                    <td class="p-3 text-center"><span class="font-bold text-gray-700">${f.quantity}</span></td>
                    <td class="p-3 flex space-x-2">
                        <button onclick="openEditModal(${f.id})" class="bg-blue-500 text-white px-4 py-1 rounded shadow hover:bg-blue-600 transition">Sửa</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- HÀM TẢI CATEGORY VÀ CANTEEN ---
        async function loadFormData() {
            const res = await fetch('/api/admin/form-data');
            const data = await res.json();
            
            const canteenOptions = '<option value="" disabled selected>-- Chọn Căn tin --</option>' + data.canteens.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            const categoryOptions = '<option value="" disabled selected>-- Chọn Danh mục --</option>' + data.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            document.getElementById('new-canteen').innerHTML = canteenOptions;
            document.getElementById('new-category').innerHTML = categoryOptions;
            document.getElementById('edit-canteen').innerHTML = canteenOptions;
            document.getElementById('edit-category').innerHTML = categoryOptions;
        }

        // --- HÀM THÊM MỚI MÓN ĂN ---
        document.getElementById('add-food-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('new-name').value,
                price: document.getElementById('new-price').value,
                quantity: document.getElementById('new-qty').value,
                canteen_id: document.getElementById('new-canteen').value,
                category_id: document.getElementById('new-category').value,
                image_url: document.getElementById('new-image-url').value
            };
            const res = await fetch('/api/admin/food', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                alert("Thêm món mới thành công!");
                document.getElementById('add-food-form').reset();
                loadInventory();
            } else { const errorData = await res.json(); alert("Lỗi: " + errorData.error); }
        });

        // --- HÀM XỬ LÝ POPUP CHỈNH SỬA ---
        function openEditModal(id) {
            const food = allFoods.find(f => f.id === id);
            if (!food) return;

            document.getElementById('edit-id').value = food.id;
            document.getElementById('edit-name').value = food.name;
            document.getElementById('edit-price').value = food.price;
            document.getElementById('edit-qty').value = food.quantity;
            document.getElementById('edit-canteen').value = food.canteen_id;
            document.getElementById('edit-category').value = food.category_id;
            document.getElementById('edit-image-url').value = food.image_url || '';

            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('edit-food-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                name: document.getElementById('edit-name').value,
                price: document.getElementById('edit-price').value,
                quantity: document.getElementById('edit-qty').value,
                canteen_id: document.getElementById('edit-canteen').value,
                category_id: document.getElementById('edit-category').value,
                image_url: document.getElementById('edit-image-url').value
            };

            const res = await fetch(`/api/admin/food/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Cập nhật thông tin món ăn thành công!");
                closeEditModal();
                loadInventory();
            } else {
                alert("Đã xảy ra lỗi khi cập nhật!");
            }
        });

        // Khởi chạy khi load trang
        loadStats(); 
        loadInventory(); 
        loadFormData();
    </script>
</body>
</html>
